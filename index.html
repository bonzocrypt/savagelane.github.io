<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Savage Lane | Portfolio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Savage Lane portfolio featuring digital projects including Vault My Bag, Event Pricing, Smart Dog Automation, and The Recycle Room.">
  <meta name="robots" content="index, follow">
  <meta name="theme-color" content="#0b0d12">
  <link rel="canonical" href="https://savagelane.com/">

  <link rel="icon" href="/images/favicon.png" type="image/png" sizes="32x32">
  <link rel="icon" href="/images/favicon.ico" type="image/x-icon">

  <meta property="og:site_name" content="Savage Lane">
  <meta property="og:title" content="Savage Lane | Portfolio">
  <meta property="og:description" content="Explore featured Savage Lane projects including VaultMyBag, Event Pricing, Smart Dog Automation, and The Recycle Room.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://savagelane.com/">
  <meta property="og:image" content="https://savagelane.com/images/savagelane_header.png">
  <meta property="og:image:secure_url" content="https://savagelane.com/images/savagelane_header.png">
  <meta property="og:image:type" content="image/png">
  <meta property="og:image:width" content="1731">
  <meta property="og:image:height" content="909">
  <meta property="og:image:alt" content="Savage Lane portfolio featuring VaultMyBag, Event Pricing, Smart Dog Automation, and The Recycle Room">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Savage Lane | Portfolio">
  <meta name="twitter:description" content="Explore featured Savage Lane projects including VaultMyBag, Event Pricing, Smart Dog Automation, and The Recycle Room.">
  <meta name="twitter:image" content="https://savagelane.com/images/savagelane_header.png">
  <meta name="twitter:image:alt" content="Savage Lane portfolio featuring VaultMyBag, Event Pricing, Smart Dog Automation, and The Recycle Room">

  <style>
    :root {
      --bg: #0b0d12;
      --panel: rgba(255,255,255,0.05);
      --panel-border: rgba(255,255,255,0.1);
      --text: #ffffff;
      --muted: #a8b0bd;
      --soft: #7e8794;
      --accent: #d6b36a;
      --accent-2: #f4e0b0;
      --shadow: 0 24px 70px rgba(0,0,0,0.45);
      --radius: 22px;
      --max: 1160px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

body {
  margin: 0;
  font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  background: #000000;
  color: var(--text);
  min-height: 100vh;
}

    a {
      color: inherit;
      text-decoration: none;
    }

    .page {
      width: 100%;
      padding: 40px 24px 40px;
    }

    .hero {
      max-width: var(--max);
      margin: 0 auto 42px;
      text-align: center;
    }

    .hero-image-wrap {
      display: block;
      width: 100%;
      margin: 0 auto 30px;
      border-radius: 28px;
      overflow: hidden;
      border: 1px solid rgba(214,179,106,0.18);
      box-shadow: 0 30px 90px rgba(0,0,0,0.5);
      background: rgba(255,255,255,0.02);
    }

    .hero-image {
      display: block;
      width: 100%;
      height: auto;
    }

    .eyebrow {
      display: inline-block;
      padding: 8px 14px;
      border: 1px solid rgba(214,179,106,0.25);
      border-radius: 999px;
      color: var(--accent-2);
      background: rgba(214,179,106,0.08);
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 18px;
    }

    h1 {
      font-size: clamp(36px, 6vw, 60px);
      line-height: 1.05;
      letter-spacing: -0.03em;
      margin: 0 0 16px;
    }

    .hero p {
      max-width: 760px;
      margin: 0 auto;
      font-size: clamp(18px, 2.4vw, 22px);
      line-height: 1.65;
      color: var(--muted);
    }

    .portfolio-grid {
      max-width: var(--max);
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 24px;
    }

    .card {
      position: relative;
      overflow: hidden;
      border-radius: var(--radius);
      border: 1px solid var(--panel-border);
      background: linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.03));
      box-shadow: var(--shadow);
      transition: transform 0.2s ease, border-color 0.2s ease, background 0.2s ease;
      min-height: 320px;
    }

    .card:hover {
      transform: translateY(-4px);
      border-color: rgba(214,179,106,0.35);
      background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.04));
    }

    .card-link {
      display: block;
      height: 100%;
      padding: 32px;
    }

    .image-only-card {
      border: none;
      box-shadow: none;
      background: transparent;
    }

    .image-only-card .card-link {
      padding: 0;
      aspect-ratio: 16 / 9;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000000;
    }

    .project-card-image {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .event-card {
      border: none;
      box-shadow: none;
      background: transparent;
    }

    .event-card .card-link {
      padding: 0;
      position: relative;
      aspect-ratio: 16 / 9;
      display: block;
      background: #000000;
    }

    .event-card .project-card-image {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .smartdog-card {
      border: none;
      box-shadow: none;
      background: transparent;
    }

    .smartdog-card .card-link {
      padding: 0;
      aspect-ratio: 16 / 9;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000000;
    }

    .smartdog-card .project-card-image {
      width: 88%;
      height: auto;
      object-fit: contain;
    }

    .recycle-card {
      border: none;
      box-shadow: none;
      background: transparent;
    }

    .recycle-card .card-link {
      padding: 0;
      aspect-ratio: 16 / 9;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000000;
    }

    .recycle-card .project-card-image {
      width: 88%;
      height: auto;
      object-fit: contain;
    }

    .event-main-link {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 18%;
      z-index: 2;
    }

    .event-play-link {
      position: absolute;
      left: 36%;
      width: 28%;
      bottom: 6%;
      height: 14%;
      z-index: 3;
      border-radius: 16px;
    }

    .card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 28px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.08);
      color: var(--accent-2);
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .arrow {
      font-size: 24px;
      line-height: 1;
      color: var(--accent);
    }

    .card h2 {
      margin: 0 0 14px;
      font-size: clamp(28px, 3vw, 38px);
      line-height: 1.08;
      letter-spacing: -0.02em;
    }

    .card p {
      margin: 0 0 24px;
      color: var(--muted);
      font-size: 17px;
      line-height: 1.75;
    }

    .project-links {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 14px;
      margin: 0 0 24px;
    }

    .project-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 11px 16px;
      border-radius: 999px;
      border: 1px solid rgba(214,179,106,0.28);
      background: rgba(214,179,106,0.08);
      color: var(--accent-2);
      font-size: 14px;
      font-weight: 600;
      transition: background 0.2s ease, border-color 0.2s ease, transform 0.2s ease;
    }

    .project-link:hover {
      background: rgba(214,179,106,0.14);
      border-color: rgba(214,179,106,0.42);
      transform: translateY(-1px);
    }

    .play-badge-link {
      display: inline-flex;
      align-items: center;
      line-height: 0;
      transition: transform 0.2s ease, opacity 0.2s ease;
    }

    .play-badge-link:hover {
      transform: translateY(-1px);
      opacity: 0.95;
    }

    .play-badge {
      display: block;
      height: 44px;
      width: auto;
    }

    .highlights {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: auto;
    }

    .pill {
      padding: 10px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      color: #d8dde6;
      font-size: 14px;
    }

    .footer {
      max-width: var(--max);
      margin: 36px auto 0;
      text-align: center;
      font-size: 14px;
      color: var(--soft);
    }

    @media (max-width: 820px) {
      .page {
        padding: 20px 18px 28px;
      }

      .portfolio-grid {
        grid-template-columns: 1fr;
      }

      .card {
        min-height: 0;
      }

      .card-link {
        padding: 26px;
      }

      .project-links {
        align-items: flex-start;
      }

      .play-badge {
        height: 42px;
      }

      .hero-image-wrap {
        border-radius: 20px;
        margin-bottom: 24px;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <section class="hero">
      <div class="hero-image-wrap">
        <img
          class="hero-image"
          src="/images/savagelane_header.png"
          alt="Savage Lane portfolio of digital products"
          width="1731"
          height="909"
        >
      </div>
    </section>

    <section class="portfolio-grid" aria-label="Featured projects">
      <article class="card image-only-card">
        <a class="card-link" href="https://vaultmybag.com/" target="_blank" rel="noopener noreferrer" aria-label="Visit Vault My Bag">
          <img
            class="project-card-image"
            src="/images/vaultmybag_card.png"
            alt="Vault My Bag luxury inventory and handbag collection management"
            width="1200"
            height="900"
          >
        </a>
      </article>

      <article class="card event-card">
        <div class="card-link">
          <img
            class="project-card-image"
            src="/images/eventpricing_card.png"
            alt="Event Pricing helps users discover live events, save favorites, and get presale alerts"
            width="1200"
            height="900"
          >
          <a
            class="event-main-link"
            href="https://eventpricing.com/"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="Visit Event Pricing website"
          ></a>
          <a
            class="event-play-link"
            href="https://play.google.com/store/apps/details?id=com.eventpricing.app"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="Get Event Pricing on Google Play"
          ></a>
        </div>
      </article>

      <article class="card recycle-card">
        <a class="card-link" href="https://therecycleroom.com/" target="_blank" rel="noopener noreferrer" aria-label="Visit The Recycle Room">
          <img
            class="project-card-image"
            src="/images/recycleroom_card.png"
            alt="The Recycle Room premium resale and consignment for higher value items"
            width="1672"
            height="941"
          >
        </a>
      </article>

      <article class="card smartdog-card">
        <a class="card-link" href="https://smartdogautomation.com/" target="_blank" rel="noopener noreferrer" aria-label="Visit Smart Dog Automation">
          <img
            class="project-card-image"
            src="/images/smartdogautomation_card.png"
            alt="Smart Dog Automation websites, automation, and growth tools for pet groomers"
            width="1672"
            height="941"
          >
        </a>
      </article>
    </section>

    <footer class="footer">© 2026 Savage Lane</footer>
  </main>
</body>
</html>
